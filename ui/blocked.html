<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intentional YT - Blocked</title>
  <link rel="stylesheet" href="../styles/ui.css">
</head>
<body class="yfg-blocked-page">
  <main class="yfg-blocked-shell">
    <section class="yfg-blocked-content" id="blocked-content"></section>
  </main>

  <script src="../utils/storage.js"></script>
  <script src="../utils/time.js"></script>
  <script>
    class BlockedPageController {
      constructor() {
        this.init();
      }

      async init() {
        await this.waitForDependencies();
        
        this.storage = window.StorageManager.getInstance();
        this.timeUtils = window.TimeUtils.getInstance();
        this.content = document.getElementById('blocked-content');
        this.breakCountdownInterval = null;
        this.setupActions();
        
        const reason = this.getBlockReason();
        await this.renderBlockedContent(reason);
        
        if (reason === 'nightlock') {
          this.startCountdown();
        } else if (reason === 'browsing-cooldown') {
          this.startBrowsingCooldownCountdown();
        }
      }

      async waitForDependencies() {
        return new Promise((resolve) => {
          const checkDependencies = () => {
            if (window.StorageManager && window.TimeUtils) {
              resolve();
            } else {
              setTimeout(checkDependencies, 100);
            }
          };
          checkDependencies();
        });
      }

      getBlockReason() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('reason') || 'unknown';
      }

      setupActions() {
        document.addEventListener('click', (event) => {
          const target = event.target;
          const action = target && target.getAttribute ? target.getAttribute('data-action') : null;

          if (!action) {
            return;
          }

          if (action === 'go-home') {
            window.location.href = 'https://www.youtube.com';
          } else if (action === 'reload') {
            window.location.reload();
          }
        });
      }

      formatClock(timeValue) {
        if (!timeValue || !timeValue.includes(':')) {
          return timeValue || '--';
        }

        const [hoursText, minutes] = timeValue.split(':');
        const hours = parseInt(hoursText, 10);
        const suffix = hours >= 12 ? 'PM' : 'AM';
        const normalizedHours = hours % 12 || 12;
        return `${normalizedHours}:${minutes} ${suffix}`;
      }

      async renderBlockedContent(reason) {
        switch (reason) {
          case 'nightlock':
            this.content.innerHTML = await this.getNightLockContent();
            break;
          case 'entertainment-limit':
            this.content.innerHTML = this.getEntertainmentLimitContent();
            break;
          case 'shorts':
            this.content.innerHTML = this.getShortsBlockContent();
            break;
          case 'session-limit':
            this.content.innerHTML = this.getSessionLimitContent();
            break;
          case 'browsing-cooldown':
            this.content.innerHTML = await this.getBrowsingCooldownContent();
            break;
          default:
            this.content.innerHTML = this.getGenericBlockContent();
        }
      }

      async getNightLockContent() {
        const settings = await this.storage.getSettings();
        const endTime = settings.nightLock.endTime;
        const currentTime = this.timeUtils.getCurrentTime();
        
        return `
          <div class="yfg-blocked-icon">🌙</div>
          <div class="yfg-blocked-eyebrow">Night Lock</div>
          <h1 class="yfg-blocked-title">YouTube Locked</h1>
          <p class="yfg-blocked-message">YouTube is blocked during your sleep hours so late-night scrolling does not steal tomorrow’s focus.</p>
          <p class="yfg-blocked-meta">Current time: ${currentTime}</p>
          <div class="yfg-blocked-countdown-wrap">
            <div class="yfg-blocked-countdown-label">Unlocks in</div>
            <div class="yfg-blocked-countdown" id="countdown">--</div>
            <div class="yfg-inline-note">Available again at ${this.formatClock(endTime)}</div>
          </div>
          <div class="yfg-blocked-panel">
            <div class="yfg-detail-label">Reset instead</div>
            <ul class="yfg-blocked-list">
              <li>Dim the lights and put the phone away.</li>
              <li>Read something slow and low-stimulation.</li>
              <li>Try a short stretch or breathing routine.</li>
              <li>Skip caffeine and bright screens before bed.</li>
            </ul>
          </div>
        `;
      }

      getEntertainmentLimitContent() {
        return `
          <div class="yfg-blocked-icon">⏰</div>
          <div class="yfg-blocked-eyebrow">Daily Limit</div>
          <h1 class="yfg-blocked-title">Daily Limit Reached</h1>
          <p class="yfg-blocked-message">You have used all of today’s entertainment time. The limit resets at midnight.</p>
          <div class="yfg-blocked-panel">
            <div class="yfg-detail-label">Better next step</div>
            <ul class="yfg-blocked-list">
              <li>Start a focused research session.</li>
              <li>Read or write for 10 minutes first.</li>
              <li>Take a walk or stretch before returning.</li>
              <li>Come back with one intentional search.</li>
            </ul>
          </div>
        `;
      }

      getShortsBlockContent() {
        return `
          <div class="yfg-blocked-icon">🚫</div>
          <div class="yfg-blocked-eyebrow">Shorts Guard</div>
          <h1 class="yfg-blocked-title">Shorts Blocked</h1>
          <p class="yfg-blocked-message">Shorts are disabled to keep YouTube from collapsing into an endless swipe loop.</p>
          <div class="yfg-blocked-actions">
            <button class="yfg-btn yfg-btn-primary" data-action="go-home" type="button">Go to YouTube Home</button>
          </div>
          <div class="yfg-blocked-panel">
            <div class="yfg-detail-label">Try instead</div>
            <ul class="yfg-blocked-list">
              <li>Search for one specific topic.</li>
              <li>Watch a full tutorial or lecture.</li>
              <li>Queue one intentional long-form video.</li>
              <li>Use playlists instead of swiping feeds.</li>
            </ul>
          </div>
        `;
      }

      getSessionLimitContent() {
        return `
          <div class="yfg-blocked-icon">🛑</div>
          <div class="yfg-blocked-eyebrow">Session Limit</div>
          <h1 class="yfg-blocked-title">Session Limit Reached</h1>
          <p class="yfg-blocked-message">You hit the maximum continuous watch time. Take a real pause before you come back.</p>
          <div class="yfg-blocked-panel">
            <div class="yfg-detail-label">Reset your focus</div>
            <ul class="yfg-blocked-list">
              <li>Step away for five to ten minutes.</li>
              <li>Move your body and hydrate.</li>
              <li>Decide what you actually need from YouTube next.</li>
            </ul>
          </div>
          <div class="yfg-blocked-actions">
            <button class="yfg-btn yfg-btn-primary" data-action="go-home" type="button">I&apos;ve Taken a Break</button>
          </div>
        `;
      }

      async getBrowsingCooldownContent() {
        const settings = await this.storage.getSettings();
        const remainingMs = Math.max(0, settings.browsingMode.cooldownUntil - Date.now());
        const remainingMinutes = Math.ceil(remainingMs / 60000);

        return `
          <div class="yfg-blocked-icon">⏳</div>
          <div class="yfg-blocked-eyebrow">Browsing Cooldown</div>
          <h1 class="yfg-blocked-title">Browsing Session Ended</h1>
          <p class="yfg-blocked-message">Browsing is paused after two extensions. Give the algorithm some distance before coming back.</p>

          <div class="yfg-blocked-countdown-wrap">
            <div class="yfg-blocked-countdown-label">Available again in</div>
            <div class="yfg-blocked-countdown" id="browsing-cooldown-countdown">${remainingMinutes}m</div>
            <div class="yfg-inline-note">Browsing is blocked for 30 minutes after two extensions.</div>
          </div>

          <div class="yfg-blocked-panel">
            <div class="yfg-detail-label">Reset the loop</div>
            <ul class="yfg-blocked-list">
              <li>Leave YouTube entirely for a while.</li>
              <li>Do one offline task before coming back.</li>
              <li>Return with a specific purpose.</li>
            </ul>
          </div>
        `;
      }

      getGenericBlockContent() {
        return `
          <div class="yfg-blocked-icon">🎯</div>
          <div class="yfg-blocked-eyebrow">Focus Guard</div>
          <h1 class="yfg-blocked-title">Focus Guard Active</h1>
          <p class="yfg-blocked-message">YouTube is currently restricted to protect attention and reduce passive drift.</p>
          <div class="yfg-blocked-panel">
            <div class="yfg-detail-label">Alternatives</div>
            <ul class="yfg-blocked-list">
              <li>Read something useful.</li>
              <li>Work on your current task list.</li>
              <li>Move, stretch, or go outside.</li>
              <li>Return later with one clear query.</li>
            </ul>
          </div>
        `;
      }

      async startCountdown() {
        const settings = await this.storage.getSettings();
        const endTime = settings.nightLock.endTime;
        
        const updateCountdown = () => {
          const { hours, minutes } = this.timeUtils.timeUntilUnlock(endTime);
          const countdownElement = document.getElementById('countdown');
          
          if (countdownElement) {
            if (hours === 0 && minutes === 0) {
              // Check if lock period has actually ended
              const isLockActive = this.timeUtils.isNightLockActive(
                settings.nightLock.startTime,
                settings.nightLock.endTime
              );
              
              if (!isLockActive) {
                window.location.href = 'https://www.youtube.com';
                return;
              }
            }
            
            const timeStr = this.timeUtils.getUnlockCountdown(endTime);
            countdownElement.textContent = timeStr;
          }
        };
        
        // Update immediately and then every minute
        updateCountdown();
        setInterval(updateCountdown, 60000);
      }

      async startBrowsingCooldownCountdown() {
        const updateCountdown = async () => {
          const settings = await this.storage.getSettings();
          const remainingMs = Math.max(0, settings.browsingMode.cooldownUntil - Date.now());
          const countdownElement = document.getElementById('browsing-cooldown-countdown');

          if (!countdownElement) {
            return;
          }

          if (remainingMs <= 0) {
            await this.storage.updateBrowsingMode({ cooldownUntil: 0 });
            await this.storage.setBlocked(null);
            window.location.href = 'https://www.youtube.com';
            return;
          }

          countdownElement.textContent = this.timeUtils.formatTime(Math.ceil(remainingMs / 1000));
        };

        await updateCountdown();
        setInterval(() => {
          updateCountdown();
        }, 1000);
      }

    }

    // Initialize when page loads
    new BlockedPageController();
  </script>
</body>
</html>
